<!DOCTYPE html>
<html>
<head>
    <title>Soner Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #444; padding: 10px; margin-bottom: 10px; }
        .msg { margin-bottom: 8px; padding: 5px; border-radius: 5px; background: #333; }
        .me { background: #0056b3; text-align: right; }
        #voice-panel { display: none; background: #2c3e50; padding: 10px; border-radius: 10px; margin-top: 10px; }
        #meter-bg { width: 100%; height: 10px; background: #444; border-radius: 5px; }
        #meter-fill { width: 0%; height: 100%; background: #2ecc71; transition: 0.1s; }
    </style>
</head>
<body>
    <h2>Hoş geldin, {{ kullanici.kullanici_adi }}</h2>
    <div id="messages"></div>
    <input id="m-in" placeholder="Mesaj yaz...">
    <button onclick="send()">Gönder</button>
    <hr>
    <button onclick="joinVoice('Genel Ses')">Sesli Odaya Katıl</button>
    
    <div id="voice-panel">
        <p>Oda: <span id="v-name"></span></p>
        <div id="meter-bg"><div id="meter-fill"></div></div>
        <button onclick="leaveVoice()">Ayrıl</button>
    </div>

    <script>
        const socket = io();
        const myName = "{{ kullanici.kullanici_adi }}";
        let curRoom = '#genel', localStream, peers = {};
        
        let rtcConfig = { 
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" },
                { urls: "stun:stun.relay.metered.ca:80" }
            ] 
        };

        function send() {
            const i = document.getElementById('m-in');
            if(i.value.trim()) { 
                socket.emit('mesaj_gonder', { mesaj: i.value, oda: curRoom }); 
                i.value = ''; 
            }
        }

        socket.on('yeni_mesaj', d => {
            const div = document.createElement('div');
            div.className = `msg ${d.gonderen === myName ? 'me' : ''}`;
            div.innerHTML = `<small style="display:block; font-size:0.7rem">${d.gonderen}</small>${d.icerik}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 99999;
        });

        async function joinVoice(sRoom) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('voice-panel').style.display = 'block';
                document.getElementById('v-name').innerText = sRoom;
                
                // Ses barı animasyonu
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(localStream);
                const node = audioCtx.createScriptProcessor(2048, 1, 1);
                source.connect(analyser); analyser.connect(node); node.connect(audioCtx.destination);
                node.onaudioprocess = () => {
                    let arr = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(arr);
                    let avg = arr.reduce((a,b)=>a+b)/arr.length;
                    document.getElementById('meter-fill').style.width = Math.min(avg * 3, 100) + "%";
                };

                socket.emit('ses_sinyali', { type: 'join', oda: sRoom, ad: myName });
            } catch(e) { alert("Mikrofon izni gerekli!"); }
        }

        socket.on('ses_sinyali_al', async (data) => {
            if (data.type === 'join') {
                const p = createPeer(data.ad, data.oda);
                const offer = await p.createOffer(); 
                await p.setLocalDescription(offer);
                socket.emit('ses_sinyali', { type: 'offer', offer, oda: data.oda, hedef: data.ad, gonderen: myName });
            } else if (data.type === 'offer') {
                const p = createPeer(data.gonderen, data.oda);
                await p.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await p.createAnswer(); 
                await p.setLocalDescription(answer);
                socket.emit('ses_sinyali', { type: 'answer', answer, oda: data.oda, hedef: data.gonderen, gonderen: myName });
            } else if (data.type === 'answer') {
                if(peers[data.gonderen]) await peers[data.gonderen].setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'ice') {
                if(peers[data.gonderen] && data.candidate) await peers[data.gonderen].addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function createPeer(target, oda) {
            const p = new RTCPeerConnection(rtcConfig);
            peers[target] = p;
            localStream.getTracks().forEach(t => p.addTrack(t, localStream));

            p.ontrack = (e) => {
                let a = document.getElementById('audio-' + target);
                if(!a) {
                    a = document.createElement('audio');
                    a.id = 'audio-' + target;
                    a.autoplay = true;
                    a.setAttribute('playsinline', 'true');
                    document.body.appendChild(a);
                }
                a.srcObject = e.streams[0];
                a.play().catch(() => {}); // Autoplay engelini aşmak için
            };

            p.onicecandidate = (e) => {
                if(e.candidate) socket.emit('ses_sinyali', { type: 'ice', candidate: e.candidate, oda: oda, hedef: target, gonderen: myName });
            };
            return p;
        }

        function leaveVoice() { location.reload(); }
    </script>
</body>
</html>
