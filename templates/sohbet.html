<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SonerChat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0b0e14; --side: #151921; --p: #00ff9d; --text: #e1e1e1; --accent: #00d4ff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--side); display: flex; flex-direction: column; border-right: 1px solid #2d3436; }
        .sidebar-header { padding: 25px; font-size: 1.4rem; font-weight: bold; color: var(--p); text-shadow: 0 0 10px rgba(0,255,157,0.3); }
        .nav-section { padding: 15px; flex: 1; overflow-y: auto; }
        .room { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; color: #8e9297; transition: 0.2s; }
        .room.active { background: rgba(0,255,157,0.1); color: var(--p); border-left: 3px solid var(--p); }
        .room.ses { color: var(--accent); border: 1px dashed var(--accent); }
        .main { flex: 1; display: flex; flex-direction: column; background: #0f1218; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1e232b; padding: 12px; border-radius: 12px; max-width: 75%; border: 1px solid #2d3436; }
        .msg.me { align-self: flex-end; background: var(--p); color: #0b0e14; }
        .input-area { padding: 20px; background: var(--side); display: flex; gap: 10px; border-top: 1px solid #2d3436; }
        input { flex: 1; background: #0b0e14; border: 1px solid #2d3436; padding: 12px; border-radius: 8px; color: white; outline: none; }
        .user-list { width: 200px; background: var(--side); padding: 20px; border-left: 1px solid #2d3436; }
        .user-item { padding: 8px; cursor: pointer; transition: 0.2s; }
        #voice-panel { display: none; background: #1e232b; padding: 15px; border-radius: 10px; margin: 10px; border: 1px solid var(--accent); }
        .meter { height: 6px; background: #0b0e14; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        #meter-fill { width: 0%; height: 100%; background: var(--p); transition: 0.1s; }
        .admin-link { display: block; color: var(--accent); text-decoration: none; font-size: 0.8rem; margin-top: 5px; font-weight: bold; }
        .admin-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">SonerChat <i class="fa fa-bolt"></i></div>
    <div class="nav-section">
        <small style="color: #4b5563">METİN KANALLARI</small>
        {% for o in yazi_odalar %}
        <div class="room {% if o.ad == '#genel' %}active{% endif %}" id="r-{{ o.id }}" onclick="switchRoom('{{ o.ad }}', '{{ o.id }}')"># {{ o.ad }}</div>
        {% endfor %}
        <br>
        <small style="color: #4b5563">SESLİ KANALLAR</small>
        {% for s in ses_odalar %}
        <div class="room ses" onclick="joinVoice('{{ s.ad }}')"><i class="fa fa-headset"></i> {{ s.ad }}</div>
        {% endfor %}

        <div id="voice-panel">
            <span id="v-name" style="font-size: 0.7rem;"></span>
            <div class="meter"><div id="meter-fill"></div></div>
            <button onclick="leaveVoice()" style="width:100%; background:#ff4757; border:none; color:white; padding:5px; border-radius:5px; cursor:pointer">AYRIL</button>
        </div>
    </div>
    
    <div style="padding: 20px; border-top: 1px solid #2d3436; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <i class="fa fa-user-circle" style="color: var(--p);"></i> 
            <strong>{{ kullanici.kullanici_adi }}</strong>
            {% if kullanici.is_super_admin %}
            <a href="/admin" class="admin-link"><i class="fa fa-cog"></i> Yönetim Paneli</a>
            {% endif %}
        </div>
        <a href="/cikis" title="Çıkış" style="color: #ff4757; text-decoration: none; font-size: 1.2rem;"><i class="fa fa-sign-out-alt"></i></a>
    </div>
</div>

<div class="main">
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="m-in" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()" style="background:var(--p); border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold">GÖNDER</button>
    </div>
</div>

<div class="user-list">
    <small style="color: #4b5563">KULLANICILAR</small>
    <div id="u-list-content" style="margin-top:10px"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    const socket = io();
    const myName = "{{ kullanici.kullanici_adi }}";
    let curRoom = '#genel', localStream, peers = {}, 
        
    
    function send() {
        const i = document.getElementById('m-in');
        if(i.value.trim()) { socket.emit('mesaj_gonder', { mesaj: i.value, oda: curRoom }); i.value = ''; }
    }

    socket.on('yeni_mesaj', d => {
        if(d.oda === curRoom) {
            const div = document.createElement('div');
            div.className = `msg ${d.gonderen === myName ? 'me' : ''}`;
            div.innerHTML = `<small style="display:block; font-size:0.6rem; opacity:0.6">${d.gonderen}</small>${d.icerik}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 99999;
        }
    });

    socket.on('kullanici_listesi', list => {
        document.getElementById('u-list-content').innerHTML = list.map(u => 
            `<div class="user-item"><i class="fa fa-circle" style="color:var(--p); font-size:0.5rem"></i> ${u}</div>`
        ).join('');
    });

    async function joinVoice(sRoom) {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('voice-panel').style.display = 'block';
            document.getElementById('v-name').innerText = sRoom;
            
            const audioCtx = new AudioContext(), analyser = audioCtx.createAnalyser(), source = audioCtx.createMediaStreamSource(localStream), node = audioCtx.createScriptProcessor(2048, 1, 1);
            source.connect(analyser); analyser.connect(node); node.connect(audioCtx.destination);
            node.onaudioprocess = () => {
                let arr = new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(arr);
                let avg = arr.reduce((a,b)=>a+b)/arr.length;
                document.getElementById('meter-fill').style.width = Math.min(avg * 3, 100) + "%";
            };
            socket.emit('ses_sinyali', { type: 'join', oda: sRoom, ad: myName });
        } catch(e) { alert("Mikrofon hatası!"); }
    }

    // 1. STUN Sunucularını güçlendirdik
let rtcConfig = { 
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        { urls: "stun:stun1.l.google.com:19302" },
        { urls: "stun:stun2.l.google.com:19302" },
        { urls: "stun:stun.relay.metered.ca:80" }
    ] 
};

socket.on('ses_sinyali_al', async (data) => {
    try {
        if (data.type === 'join') {
            const p = createPeer(data.ad, data.oda);
            const offer = await p.createOffer(); 
            await p.setLocalDescription(offer);
            socket.emit('ses_sinyali', { type: 'offer', offer, oda: data.oda, hedef: data.ad, gonderen: myName });
        } 
        else if (data.type === 'offer') {
            const p = createPeer(data.gonderen, data.oda);
            await p.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await p.createAnswer(); 
            await p.setLocalDescription(answer);
            socket.emit('ses_sinyali', { type: 'answer', answer, oda: data.oda, hedef: data.gonderen, gonderen: myName });
        } 
        else if (data.type === 'answer') {
            // Eğer peer henüz oluşmadıysa kısa bir süre bekle (Yarış durumunu engeller)
            if (peers[data.gonderen]) {
                await peers[data.gonderen].setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        } 
        else if (data.type === 'ice') {
            // ICE adaylarını eklemek için PeerConnection'ın hazır olması gerekir
            if (peers[data.gonderen] && data.candidate) {
                try {
                    await peers[data.gonderen].addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch(e) { console.warn("ICE ekleme hatası:", e); }
            }
        }
    } catch (err) {
        console.error("Sinyalleşme hatası:", err);
    }
});

function createPeer(target, oda) {
    const p = new RTCPeerConnection(rtcConfig); 
    peers[target] = p;

    // Kendi sesimizi kanala ekliyoruz
    if (localStream) {
        localStream.getTracks().forEach(t => p.addTrack(t, localStream));
    }

    // Karşıdan ses geldiğinde
    p.ontrack = (e) => {
        let a = document.getElementById('audio-' + target);
        if(!a) { 
            a = document.createElement('audio'); 
            a.id = 'audio-' + target; 
            a.autoplay = true; 
            a.setAttribute('playsinline', 'true'); // Mobil cihazlar için önemli
            document.body.appendChild(a); 
        }
        a.srcObject = e.streams[0];
        
        // Tarayıcı kısıtlamalarını aşmak için manuel oynatmayı tetikle
        a.play().catch(err => console.warn("Otomatik ses başlatılamadı:", err));
    };

    // Bağlantı durumunu konsolda takip edelim (Hata ayıklamak için)
    p.onconnectionstatechange = () => {
        console.log(`${target} ile bağlantı durumu: ${p.connectionState}`);
    };

    p.onicecandidate = (e) => { 
        if(e.candidate) {
            socket.emit('ses_sinyali', { type: 'ice', candidate: e.candidate, oda: oda, hedef: target, gonderen: myName }); 
        }
    };
    
    return p;
}
</script>
</body>

</html>
