<!DOCTYPE html>
<html>
<head>
    <title>Soner Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f0f0f; --panel: #161616; --accent: #8e44ad; --text: #bbb; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 240px; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1e1e1e; padding: 10px; border-radius: 8px; max-width: 70%; border: 1px solid #333; }
        .msg.me { align-self: flex-end; background: var(--accent); border: none; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: #111; border-top: 1px solid #222; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; outline: none; }
        button { background: var(--accent); border: none; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .sidebar-title { font-size: 0.7rem; color: #555; text-transform: uppercase; margin: 20px 0 10px; }
        .online-user { font-size: 0.9rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .online-user::before { content: ""; width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--accent); margin:0 0 20px 0;">SONER CHAT</h2>
        <p><i class="fas fa-user"></i> {{ kullanici.kullanici_adi }}</p>
        <button onclick="joinVoice()" id="v-btn" style="background:#27ae60; margin-top:10px;"><i class="fas fa-microphone"></i> Sesli Odaya Gir</button>
        <div class="sidebar-title">ÇEVRİMİÇİLER</div>
        <div id="u-list"></div>
        <button onclick="window.location.href='/logout'" style="background:#c0392b; margin-top:auto;">Çıkış Yap</button>
    </div>

    <div class="chat-main">
        <div id="messages"></div>
        <div class="input-area">
            <input id="m-in" placeholder="Bir şeyler yaz..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const socket = io();
        const myName = "{{ kullanici.kullanici_adi }}";
        let localStream, peers = {};

        function send() {
            const i = document.getElementById('m-in');
            if(i.value.trim()) { socket.emit('mesaj_gonder', { mesaj: i.value }); i.value = ''; }
        }

        socket.on('yeni_mesaj', d => {
            const div = document.createElement('div');
            div.className = `msg ${d.gonderen === myName ? 'me' : ''}`;
            div.innerHTML = `<small style="display:block; font-size:0.6rem; opacity:0.6">${d.gonderen}</small>${d.icerik}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 99999;
        });

        socket.on('kullanici_listesi', list => {
            document.getElementById('u-list').innerHTML = list.map(u => `<div class="online-user">${u}</div>`).join('');
        });

        // SES SİSTEMİ (STUN DAHİL)
        async function joinVoice() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('v-btn').innerText = "Seste Bağlı...";
                document.getElementById('v-btn').style.background = "#8e44ad";
                socket.emit('ses_sinyali', { type: 'join', ad: myName });
            } catch(e) { alert("Mikrofon izni şart!"); }
        }

        socket.on('ses_sinyali_al', async (data) => {
            if (data.type === 'join') {
                const p = createPeer(data.ad);
                const offer = await p.createOffer(); await p.setLocalDescription(offer);
                socket.emit('ses_sinyali', { type: 'offer', offer, hedef: data.ad, gonderen: myName });
            } else if (data.type === 'offer' && data.hedef === myName) {
                const p = createPeer(data.gonderen);
                await p.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await p.createAnswer(); await p.setLocalDescription(answer);
                socket.emit('ses_sinyali', { type: 'answer', answer, hedef: data.gonderen, gonderen: myName });
            } else if (data.type === 'answer' && data.hedef === myName) {
                if(peers[data.gonderen]) await peers[data.gonderen].setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.type === 'ice' && data.hedef === myName) {
                if(peers[data.gonderen]) await peers[data.gonderen].addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function createPeer(target) {
            const p = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            peers[target] = p;
            localStream.getTracks().forEach(t => p.addTrack(t, localStream));
            p.ontrack = (e) => {
                let a = document.getElementById('audio-' + target);
                if(!a) { a = document.createElement('audio'); a.id = 'audio-' + target; a.autoplay = true; document.body.appendChild(a); }
                a.srcObject = e.streams[0];
            };
            p.onicecandidate = (e) => { if(e.candidate) socket.emit('ses_sinyali', { type: 'ice', candidate: e.candidate, hedef: target, gonderen: myName }); };
            return p;
        }
    </script>
</body>
</html>
